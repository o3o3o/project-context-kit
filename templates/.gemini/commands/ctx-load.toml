prompt = """
Restore the current working context for a new session.
1. Read `.project-context/runtime/context-map.yaml` first if it exists and is fresh.
2. If the map is missing, stale, or has placeholder `current` fields, read `.project-context/docs/task/active/index.md` and `.project-context/docs/task/active/summary.md`.
3. Read `.project-context/docs/project/metadata.yaml`, `.project-context/docs/project/context.md`, decisions, verification, or tasklist only when the map or current task needs them.
4. Do not read `.project-context/docs/task/active/tasklist.md` by default; use it only for module claiming, active/blocked module detail, or global scheduling.
5. Use the `activate_skill` tool with `name='context-load'` to synthesize the current project context state.
"""
description = "Restore current project context (Gemini CLI)"
