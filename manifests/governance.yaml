version: "1.2.0"
package_name: "repo-governance-kit"
description: "Multi-Agent / multi-IDE collaboration governance layer"
canonical_source: "https://github.com/example/repo-governance-kit"

structure:
  governance_dir: ".ai-governance"
  project_docs_dir: ".ai-governance/docs/project"
  task_docs_dir: ".ai-governance/docs/task"

injection_targets:
  - file: "AGENTS.md"
    marker: "AI-GOVERNANCE"
    append_template: "templates/root/AGENTS.append.md"
  - file: "CLAUDE.md"
    marker: "AI-GOVERNANCE"
    append_template: "templates/root/CLAUDE.append.md"
  - file: "GEMINI.md"
    marker: "AI-GOVERNANCE"
    append_template: "templates/root/GEMINI.append.md"

assets:
  governance:
    - templates/governance/AGENTS.shared.md
    - templates/governance/CLAUDE.shared.md
    - templates/governance/GEMINI.shared.md
    - templates/governance/repo-contract.md
    - templates/governance/install-manifest.yaml
  rules:
    - templates/.agents/rules/00-repo-contract.md
  skills:
    - templates/.agents/skills/task-bootstrap
    - templates/.agents/skills/task-context
    - templates/.agents/skills/task-archive
    - templates/.agents/skills/task-commit
    - templates/.agents/skills/task-branch
    - templates/.agents/skills/task-merge
    - templates/.agents/skills/verify-change
  docs_project:
    - templates/governance/docs/project/metadata.yaml
    - templates/governance/docs/project/context.md
    - templates/governance/docs/project/architecture.md
    - templates/governance/docs/project/coding-standards.md
    - templates/governance/docs/project/verify-runbook.md
  docs_task_template:
    - templates/governance/docs/task/_template/task.md
    - templates/governance/docs/task/_template/plan.md
    - templates/governance/docs/task/_template/branches/main/summary.md
    - templates/governance/docs/task/_template/commits/_commit_template.md
    - templates/governance/docs/task/_template/verification.md
